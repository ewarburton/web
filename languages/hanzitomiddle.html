<!DOCTYPE html>

    <title>Hanzi to Middle Chinese Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Microsoft YaHei', SimSun, serif;
            box-sizing: border-box;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .copy-btn {
            background: #28a745;
            padding: 8px 20px;
            font-size: 14px;
            margin: 10px 0;
            display: inline-block;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .output-container {
            position: relative;
        }
        .output {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            min-height: 100px;
            font-size: 16px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .character-pair {
            display: inline-block;
            margin: 5px 10px;
            vertical-align: top;
        }
        .hanzi {
            font-size: 24px;
            font-family: 'Microsoft YaHei', SimSun, serif;
            display: block;
            text-align: center;
            margin-bottom: 3px;
            color: #333;
        }
        .romanization {
            font-size: 14px;
            font-family: 'Courier New', monospace;
            display: block;
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        .info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin: 20px 0;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>漢字 → Middle Chinese</h1>
        <div class="subtitle">Hanzi to Middle Chinese Romanization Converter</div>
        
        <div class="info">
            <strong>Note:</strong> This converter uses reconstructed Middle Chinese pronunciations (circa 600 CE) based on the Baxter-Sagart system. Enter Chinese characters below to see their Middle Chinese readings.
        </div>

        <label for="input">Enter Chinese Characters (漢字):</label>
        <textarea id="input" placeholder="输入汉字，例如：中国语言学"></textarea>
        
        <button onclick="convert()">Convert to Middle Chinese</button>
        
        <div class="output-container">
            <label for="output">Middle Chinese Romanization:</label>
            <button class="copy-btn" onclick="copyOutput()" id="copyBtn" style="display:none;">📋 Copy Romanization</button>
            <div id="output" class="output">Results will appear here...</div>
        </div>
    </div>

        let lastConversionText = '';

        function convert() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            const copyBtn = document.getElementById('copyBtn');
            
            if (!input.trim()) {
                output.innerHTML = 'Please enter some Chinese characters.';
                copyBtn.style.display = 'none';
                return;
            }
            
            let result = '';
            let textResult = '';
            
            for (let char of input) {
                if (mcDict[char]) {
                    result += `<span class="character-pair">
                        <span class="hanzi">${char}</span>
                        <span class="romanization">${mcDict[char]}</span>
                    </span>`;
                    textResult += mcDict[char] + ' ';
                } else if (char.trim() === '') {
                    result += '   '; // Preserve spacing
                    textResult += ' ';
                } else if (char.match(/[a-zA-Z0-9]/)) {
                    result += char; // Keep ASCII characters as-is
                    textResult += char;
                } else {
                    result += `<span class="character-pair">
                        <span class="hanzi">${char}</span>
                        <span class="romanization" style="color: #999;">?</span>
                    </span>`;
                    textResult += '? ';
                }
            }
            
            output.innerHTML = result || 'No characters found.';
            lastConversionText = textResult.trim();
            copyBtn.style.display = result ? 'inline-block' : 'none';
        }

        function copyOutput() {
            if (!lastConversionText) return;
            
            navigator.clipboard.writeText(lastConversionText).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                btn.style.background = '#20c997';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        // Allow Enter key to convert
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                convert();
            }
        });
    </script>
